usage_rules:
  - "Ops / RevOps / RFP / Legal Ops / Supply Chain requests -> BOPs Request Form"
  - "Marketing support -> #marketing-requests"
  - "$1M+ proposal support -> #whale-proposals"
  - "NCS support -> submit in Salesforce, add to Adoption Caravan schedule, then use NCS Query Board"
  - "Print/sample support -> enter in SFDC, then use #print-fulfillment, then track in In Flight Orders"
  - "Rostering issues -> send AE handoff email 2 weeks before access, use #team-rostering-gtm-support for complex cases"
  - "Pilot work -> follow 2026 Pilot Process Checklist, update weekly health scores in Salesforce, use district pilot Slack channels, include assigned NCS"
